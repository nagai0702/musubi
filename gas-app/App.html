<script>
const TYPE_LABEL = { in:'出勤', out:'退勤', break_start:'休憩開始', break_end:'休憩終了', away:'外出', back:'戻り' };
const ROOMS = <?!= JSON.stringify(rooms) ?>;
const USER = <?!= JSON.stringify(user) ?>;

let currentDate = new Date();
const $ = (s) => document.querySelector(s);

function fmtDate(d) {
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function setDate(d) {
  currentDate = d;
  $('#dateInput').value = fmtDate(d);
  loadAll();
}

function loadAll() {
  const ds = fmtDate(currentDate);
  google.script.run.withSuccessHandler(renderAttendance).api_getAttendance(ds);
  google.script.run.withSuccessHandler(renderRooms).api_getBookings(ds);
}

function renderAttendance(rows) {
  const tbody = $('#attendanceTable tbody');
  tbody.innerHTML = rows.map(r =>
    `<tr><td>${r.time}</td><td>${r.userName}</td><td><span class="badge ${r.type}">${TYPE_LABEL[r.type]||r.type}</span></td></tr>`
  ).join('') || '<tr><td colspan="3" style="text-align:center;color:#999">記録なし</td></tr>';
}

function renderRooms(data) {
  const slots = data.slots;
  const bookings = data.bookings;
  let html = '<thead><tr><th>時刻</th>' + ROOMS.map(r=>`<th>${r}</th>`).join('') + '</tr></thead><tbody>';
  slots.forEach(s => {
    html += `<tr><td>${s}</td>`;
    ROOMS.forEach(room => {
      const hit = bookings.find(b => b.room===room && s>=b.start && s<b.end);
      if (hit) {
        const cls = hit.userId===USER.id ? 'mine' : 'booked';
        html += `<td class="${cls}" title="${hit.title} / ${hit.userName}" data-id="${hit.id}">${hit.title}</td>`;
      } else {
        html += '<td></td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody>';
  $('#roomGrid').innerHTML = html;
  renderVisitors(data.visitors);

  $('#roomGrid').querySelectorAll('td.mine').forEach(td => {
    td.addEventListener('click', () => {
      if (confirm('予約を削除しますか？')) {
        google.script.run.withSuccessHandler(loadAll)
          .withFailureHandler(e=>alert(e.message))
          .api_deleteBooking(td.dataset.id);
      }
    });
  });
}

function renderVisitors(visitors) {
  $('#visitorList').innerHTML = visitors.map(v =>
    `<li><b>${v.time}</b> ${v.name} ${v.company?'('+v.company+')':''}<br><small>用件: ${v.purpose||'-'} / 担当: ${v.host}</small></li>`
  ).join('') || '<li style="text-align:center;color:#999">来客予定なし</li>';
}

/* タブ */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $('#tab-'+t.dataset.tab).classList.add('active');
  });
});

/* 日付ナビ */
$('#prevDay').addEventListener('click', () => { const d=new Date(currentDate); d.setDate(d.getDate()-1); setDate(d); });
$('#nextDay').addEventListener('click', () => { const d=new Date(currentDate); d.setDate(d.getDate()+1); setDate(d); });
$('#dateInput').addEventListener('change', e => setDate(new Date(e.target.value)));

/* 予約 */
$('#newBookingBtn').addEventListener('click', () => $('#bookingDialog').showModal());
$('#bookingSubmit').addEventListener('click', e => {
  e.preventDefault();
  const f = $('#bookingDialog').querySelector('form');
  const fd = new FormData(f);
  google.script.run
    .withSuccessHandler(() => { $('#bookingDialog').close(); f.reset(); loadAll(); })
    .withFailureHandler(err => alert(err.message))
    .api_createBooking({
      date: fmtDate(currentDate),
      room: fd.get('room'),
      start: fd.get('start'),
      end: fd.get('end'),
      title: fd.get('title')
    });
});

/* 来客 */
$('#newVisitorBtn').addEventListener('click', () => $('#visitorDialog').showModal());
$('#visitorSubmit').addEventListener('click', e => {
  e.preventDefault();
  const f = $('#visitorDialog').querySelector('form');
  const fd = new FormData(f);
  google.script.run
    .withSuccessHandler(() => { $('#visitorDialog').close(); f.reset(); loadAll(); })
    .withFailureHandler(err => alert(err.message))
    .api_addVisitor({
      date: fmtDate(currentDate),
      time: fd.get('time'),
      name: fd.get('name'),
      company: fd.get('company'),
      purpose: fd.get('purpose')
    });
});

setDate(new Date());
</script>
